# ============================================================
#  servers.conf – Server list for check-certs
#
#  Format:
#    hostname:port           TLS (STARTTLS auto-detected by port)
#    hostname:port:proto     Explicit protocol override
#
#  Protocols:
#    STARTTLS:      smtp  submission  imap  pop3  ldap  ftp  xmpp
#    Plain TLS:     tls   https  ldaps  imaps  pop3s  smtps  ftps
#    (plain TLS is also the default for any port not listed below)
#
#  STARTTLS auto-detected ports:
#    25, 465, 587 → smtp    389 → ldap
#    143          → imap    21  → ftp
#    110          → pop3    5222 → xmpp
#
#  Groups are defined with [Group name]
# ============================================================

[LDAP]
ldap.example.com:636:ldaps
ldap-dev.example.com:636:ldaps
ldap-plain.example.com:389

[Web]
www.example.com:443:https
intranet.example.com:443:https

[Mail]
mail.example.com:587:submission
imap.example.com:143:imap
imap.example.com:993:imaps

[Services]
ticketing.example.com:443:https

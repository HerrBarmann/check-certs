# ============================================================
#  check-certs.conf – Configuration reference / manual install template
#
#  This file serves two purposes:
#    1. Reference – documents every available setting with defaults
#    2. Manual install starting point – copy to your install directory
#       and uncomment/edit the settings you need
#
#  The installers (install-macos.sh / install-linux.sh) write their
#  own minimal check-certs.conf containing only the settings relevant
#  to the chosen variant. They do NOT copy or modify this file.
#
#  Shared by all variants:
#    check-certs.sh              (terminal)
#    check-certs-notify.sh       (macOS notifications)
#    check-certs-mail.sh         (email, Postfix/ssmtp/sendmail, Linux + macOS)
#    check-certs-webhook.sh      (webhook / HTTP POST)
#
#  Settings not relevant to the active variant are ignored.
#  An existing check-certs.conf is never overwritten on reinstall.
# ============================================================

# ── Server list ───────────────────────────────────────────────
# Path to servers.conf. Defaults to the same directory as the scripts.
#SERVER_FILE="/opt/check-certs/servers.conf"

# ── Thresholds ────────────────────────────────────────────────
# Number of days remaining before each severity level is triggered.
# Set URGENT_DAYS=0 to disable the urgent level entirely.
WARN_DAYS=15
CRIT_DAYS=7
URGENT_DAYS=2

# ── Connection ────────────────────────────────────────────────
# Timeout in seconds for each certificate check connection.
TIMEOUT=5

# ── Performance ───────────────────────────────────────────────
# Maximum number of certificate checks to run in parallel.
MAX_JOBS=10

# ── Display ───────────────────────────────────────────────────
# Maximum length of the CA name column.
CA_MAX_LEN=30

# ── State tracking ────────────────────────────────────────────
# Path to the state file used by the automation variants.
# Each variant defaults to its own state file (state-mail, state-webhook,
# etc.) so multiple variants can run simultaneously without interfering.
# Override here only if you want to force a shared state file or a
# custom location.
#
#   Linux:  STATE_FILE=/var/lib/check-certs/state-mail
#   macOS:  STATE_FILE=$HOME/Library/Application Support/check-certs/state-mail
#
#STATE_FILE=

# ── Email settings (check-certs-mail.sh) ────────────────────
# Edit these before using the email variant. Ignored by all other variants.

# Mail transport: postfix (mailutils), ssmtp, or sendmail.
# Use sendmail if you have Exim or another MTA already configured.
# Set by the installer; change here if switching transport after installation.
#MAIL_TRANSPORT=postfix

# Primary recipient for all certificate warnings.
#MAIL_TO="admin@example.com"

# Additional recipient for URGENT alerts only.
# Set to the same address as MAIL_TO to disable the second recipient.
#MAIL_TO_URGENT="admin@example.com"

# Sender address shown in the From: header.
#MAIL_FROM="certcheck@example.com"

# ── Notification log (check-certs-notify.sh) ─────────────────
# Path to the log file written by the macOS notification variant.
# Leave commented out to use the built-in default.
#LOG_FILE="$HOME/Library/Logs/check-certs/check-certs-notify.log"

# ── Pushover settings (check-certs-pushover.sh) ─────────────────
# Application token from pushover.net/apps (required).
#PUSHOVER_APP_TOKEN=""

# User or group key from your Pushover dashboard (required).
#PUSHOVER_USER_KEY=""

# Restrict notifications to a specific device name (leave commented for all).
#PUSHOVER_DEVICE=""

# Seconds between emergency priority retries for URGENT/EXPIRED certs. Min 30.
#PUSHOVER_RETRY=300

# Stop retrying after this many seconds. Max 10800 (3 hours).
#PUSHOVER_EXPIRE=3600

# ── Teams settings (check-certs-teams.sh) ───────────────────────
# Workflow webhook URL from Teams. Required for the Teams variant.
# Create via: Teams channel → ⋯ → Workflows →
#   "Post to a channel when a webhook request is received"
#TEAMS_WEBHOOK_URL=""

# ── Webhook settings (check-certs-webhook.sh) ─────────────────
# URL to POST JSON payloads to. Required for the webhook variant –
# it will not start without this set. Ignored by all other variants.
#WEBHOOK_URL="https://hooks.example.com/my-endpoint"

# Optional authentication header name and value.
# For Bearer tokens:   WEBHOOK_AUTH_HEADER="Authorization"
#                      WEBHOOK_AUTH_VALUE="Bearer mytoken"
# For custom headers:  WEBHOOK_AUTH_HEADER="X-API-Key"
#                      WEBHOOK_AUTH_VALUE="mysecret"
#WEBHOOK_AUTH_HEADER="Authorization"
#WEBHOOK_AUTH_VALUE="Bearer <your-token>"

# Post a summary event after all checks complete (true/false).
#WEBHOOK_SEND_SUMMARY=true
